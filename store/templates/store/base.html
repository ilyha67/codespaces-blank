<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ExtensionMarket{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg mb-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="text-2xl font-bold text-blue-600">School?OneWinMarket!</a>
                <form action="/search/" method="GET" class="flex-1 max-w-md mx-8">
                    <input type="text" name="q" placeholder="Поиск расширений..." class="w-full px-4 py-2 border rounded-lg">
                </form>
                <div class="flex gap-4 items-center">
                    {% if user.is_authenticated %}
                        <span class="text-gray-700">Привет, {{ user.username }}!</span>
                        <a href="{% url 'profile' %}" class="text-gray-600 hover:text-blue-600">Профиль</a>
                        <a href="{% url 'logout' %}" class="text-gray-600 hover:text-red-600">Выйти</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-gray-600 hover:text-blue-600">Вход</a>
                        <a href="{% url 'register' %}" class="text-gray-600 hover:text-blue-600">Регистрация</a>
                    {% endif %}
                    <a href="/admin/" class="text-gray-600 hover:text-orange-600">Админка</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
